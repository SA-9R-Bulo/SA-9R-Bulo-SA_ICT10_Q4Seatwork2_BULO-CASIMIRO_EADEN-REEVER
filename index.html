<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grade 10 Classmates System</title>

<style>
  body {
  font-family: Arial, sans-serif;
  margin: 30px;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  }

  h1 {
    text-align: center;
    color: #333;
  }

  .container {
    max-width: 700px;
    margin: auto;
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 5px;
    color: white;
  }

  .add-btn {
    background-color: #007bff;
  }

  .show-btn {
    background-color: #28a745;
  }

  #classmateList {
    margin-top: 20px;
  }

  .list-item {
    padding: 10px;
    border-bottom: 1px solid #ccc;
  }
</style>

</head>

<body>

<h1>📘 Grade 10 Classmates System</h1>

<div class="container">

  <input type="text" id="name" placeholder="Enter classmate name">
  <input type="text" id="section" placeholder="Enter section">
  <input type="text" id="subject" placeholder="Enter favorite subject">

  <div class="buttons">
    <button class="add-btn" py-click="add">Add Classmate</button>
    <button class="show-btn" py-click="show">Show List</button>
  </div>

  <div id="classmateList"></div>

 
  <py-script src="main.py"></py-script>

</div>

</body>
</html>
